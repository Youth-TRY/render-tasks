services:
  - type: web
    name: youthtry-tasks
    runtime: node
    plan: free
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: API_KEY
        sync: false
      - key: WECHAT_APPID
        sync: false
      - key: WECHAT_SECRET
        sync: false
      - key: MX_APIKEY
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_API_URL
        value: https://api.mimo.xiaomi.com/v1/chat/completions
      - key: AI_MODEL
        value: mimo-v2.5-pro
